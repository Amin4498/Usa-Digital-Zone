<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA Digital Zone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
header{
background:#ff5a00;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

header h1{
font-size:26px;
}

nav{
display:flex;
gap:15px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
text-decoration:underline;
}

/* HERO */
.hero{
background:linear-gradient(to right,#ff6a00,#ff9900);
color:white;
text-align:center;
padding:90px 20px;
}

.hero h2{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
opacity:0.95;
}

.hero button{
padding:12px 28px;
border:none;
background:white;
color:#ff5a00;
font-size:16px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.05);
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
}

.section h2{
margin-bottom:25px;
font-size:28px;
}

/* CARDS */
.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
width:230px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:10px;
font-size:18px;
}

/* FOOTER */
footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>USA Digital Zone</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">

<h2>Best Products. Best Prices.</h2>
<p>Welcome to USA Digital Zone</p>

<button>Shop Now</button>

</section>

<section class="section">

<h2>Featured Categories</h2>

<div class="cards">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Bank</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Crypto</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Email</h3>
</div>

</div>

</section>

<footer>
© 2026 USA Digital Zone
</footer>

</body>
</html>
