<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA Digital Zone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff5a00;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:30px;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#ff6a00,#ff9900);
color:white;
text-align:center;
padding:100px 20px;
}

.hero h2{
font-size:45px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

button{
padding:15px 35px;
border:none;
background:white;
color:#ff5a00;
font-size:18px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.section{
padding:60px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<h1>USA Digital Zone</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Best Products. Best Prices.</h2>

<p>Welcome to USA Digital Zone</p>

<button>Shop Now</button>

</section>

<section class="section">

<h2>Featured Categories</h2>

<div class="cards">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Bank</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Crypto</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Email</h3>
</div>

</div>

</section>

<footer>

© 2026 USA Digital Zone

</footer>

</body>
</html>
